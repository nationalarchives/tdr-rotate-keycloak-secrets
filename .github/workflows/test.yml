name: TDR Run Lambda Tests
on:
  pull_request:
  push:
    branches-ignore:
      - main
      - release-*
permissions: {}
jobs:
  test:
    permissions:
      id-token: write
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@e7b57a3bdf7863c951cd203101c6d566986376e3 # v.0.0.38
    with:
      repo-name: tdr-rotate-keycloak-secrets
      test-command: |
        sbt test
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
