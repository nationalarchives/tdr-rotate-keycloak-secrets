name: TDR Deploy Keycloak Secret Rotation Lambda
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment'
        required: true
        options:
          - intg
          - staging
          - prod
        default: 'intg'
      to-deploy:
        description: 'Version to deploy'
        required: true

run-name: Deploying Keycloak Secret Rotation Lambda ${{inputs.to-deploy}} to ${{inputs.environment}}
permissions: {}
jobs:
  deploy:
    permissions:
      id-token: write
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_deploy.yml@f318ce8a5d99c08b1235663f97fdb1b35844674e # v.0.0.39
    with:
      lambda-name: rotate-keycloak-secrets
      deployment-package: rotate-keycloak-secrets.jar
      environment: ${{ github.event.inputs.environment }}
      to-deploy: ${{ github.event.inputs.to-deploy }}
    secrets:
      ACCOUNT_NUMBER: ${{ secrets.ACCOUNT_NUMBER }}
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
